<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>concert-placer</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="searchbar">
    <h1>concert-placer</h1>
    <form id="search-form" autocomplete="off">
      <label class="field">
        <span>Artist page URL</span>
        <input id="artist-url" name="artist_url" type="url" inputmode="url"
               placeholder="https://…" required />
      </label>
      <label class="field">
        <span>Start location</span>
        <input id="start-location" name="start_location" type="text"
               placeholder="City, State" required />
      </label>
      <button id="submit" type="submit">Find concerts</button>
    </form>
  </header>

  <main class="layout">
    <div id="map" aria-label="Map of concert venues"></div>
    <section class="results">
      <div id="status" class="status" role="status"></div>
      <ul id="cards" class="cards"></ul>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/static/app.js"></script>
</body>
</html>
