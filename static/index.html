<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <title>concert-placer</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <header class="brand">
        <h1>concert<span class="brand-accent">-placer</span></h1>
        <p class="tagline">how far is the show?</p>
      </header>

      <form id="search-form" autocomplete="off">
        <label class="field">
          <span>Artist name or page URL</span>
          <input id="artist-url" name="artist_query" type="text"
                 placeholder="boygenius or https://…" required />
        </label>
        <label class="field">
          <span>Start location</span>
          <input id="start-location" name="start_location" type="text"
                 placeholder="City, State" required />
        </label>
        <button id="submit" class="btn-primary" type="submit">Find concerts</button>
      </form>

      <section id="candidate-section" class="candidates" hidden>
        <h2 class="section-title">Artist matches</h2>
        <ul id="candidate-list" class="candidate-list"></ul>
      </section>

      <section id="saved-section" class="saved" hidden>
        <h2 class="section-title">Saved artists</h2>
        <ul id="saved-list" class="saved-list"></ul>
      </section>

      <div id="error" class="error-banner" hidden></div>
      <div id="status" class="status" hidden></div>

      <section id="results-section" class="results" hidden>
        <div id="artist-header" class="artist-header" hidden>
          <img id="artist-avatar" class="artist-avatar" alt="" hidden />
          <div>
            <h2 id="artist-name" class="artist-name"></h2>
            <p id="results-summary" class="results-summary"></p>
          </div>
        </div>
        <div class="sort-row">
          <span class="section-title">Sort by</span>
          <div class="segmented" role="group" aria-label="Sort results">
            <button type="button" data-sort="date">Date</button>
            <button type="button" data-sort="distance" class="active">Distance</button>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-group filter-toggles">
            <button
              type="button"
              class="filter-toggle active"
              data-filter="hideSoldOut"
              aria-pressed="true"
            >
              Hide sold out
            </button>
            <button
              type="button"
              class="filter-toggle active"
              data-filter="hideUnreachable"
              aria-pressed="true"
            >
              Hide unreachable
            </button>
          </div>
          <div class="filter-group filter-distance-group">
            <label for="filter-distance" id="filter-distance-label" class="filter-label"
              >Any drive</label
            >
            <input
              type="range"
              id="filter-distance"
              class="filter-slider"
              min="50"
              max="1000"
              step="50"
              value="1000"
              aria-label="Maximum drive distance in miles"
            />
          </div>
          <div class="filter-group filter-date-group">
            <label class="filter-label" for="filter-date-from">From</label>
            <input type="date" id="filter-date-from" class="filter-date" />
            <label class="filter-label" for="filter-date-to">To</label>
            <input type="date" id="filter-date-to" class="filter-date" />
          </div>
        </div>
        <ul id="cards" class="cards"></ul>
      </section>
    </aside>

    <main id="map" aria-label="Concert map"></main>

    <nav class="view-toggle" role="group" aria-label="Switch between list and map">
      <button type="button" data-view="list" class="active">List</button>
      <button type="button" data-view="map">Map</button>
    </nav>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/static/app.js"></script>
</body>
</html>
