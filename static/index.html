<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f0ede4" />
  <meta
    name="description"
    content="Find an artist's upcoming shows, compare the drive, and put every stop on the map."
  />
  <title>Concert Placer — Put the tour on your map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/style.css?v=24" />
</head>
<body data-view="list">
  <div class="layout">
    <aside class="sidebar">
      <form id="search-form" autocomplete="off">
        <header class="brand">
          <div class="field artist-field">
            <label class="sr-only" for="artist-url">Who do you want to see?</label>
            <span class="brand-lockup">
              <span class="input-shell input-artist brand-search-line">
                <textarea
                  id="artist-url"
                  class="brand-search-input"
                  name="artist_query"
                  placeholder="Japanese Breakfast"
                  aria-autocomplete="list"
                  aria-controls="candidate-list"
                  aria-expanded="false"
                  rows="1"
                  wrap="soft"
                  spellcheck="false"
                  required
                ></textarea>
                <span class="brand-block-caret" aria-hidden="true"></span>
                <span id="artist-placeholder" class="rolling-placeholder" aria-hidden="true">
                  Concert
                </span>
              </span>
              <span class="brand-fixed-line">
                Finder<span class="brand-mark">↗</span>
              </span>
            </span>
            <section id="candidate-section" class="candidate-popover" aria-label="Artist matches" hidden>
              <ul id="candidate-list" class="candidate-list" role="listbox"></ul>
            </section>
          </div>
          <p class="tagline">Put the tour on your map.</p>
        </header>

        <section class="search-panel" aria-label="Find the next show">
          <div class="location-control">
            <button
              id="location-toggle"
              class="location-summary"
              type="button"
              aria-expanded="true"
              aria-controls="location-editor"
              hidden
            >
              <span class="location-summary-label">From</span>
              <strong id="location-summary-text">Set your starting point</strong>
              <span class="location-change">Change</span>
            </button>
            <label id="location-editor" class="field location-editor">
              <span class="field-label">Where are you leaving from?</span>
              <span class="input-shell input-location">
                <input
                  id="start-location"
                  name="start_location"
                  type="text"
                  placeholder="Washington, DC"
                  required
                />
              </span>
            </label>
          </div>
          <button id="submit" class="btn-primary" type="submit">
            <span id="submit-label">Find artist</span>
            <span class="button-arrow" aria-hidden="true">↗</span>
          </button>
          <div id="status" class="status search-status" role="status" aria-live="polite" hidden></div>
          <div id="error" class="error-banner search-error" role="alert" hidden></div>
        </section>
      </form>

      <section id="saved-section" class="saved" aria-label="Recent searches" hidden>
        <ul id="saved-list" class="saved-list"></ul>
      </section>

      <section id="results-section" class="results" aria-labelledby="artist-name" hidden>
        <div class="sheet-controls">
          <button
            id="sheet-handle"
            class="sheet-handle"
            type="button"
            aria-label="Expand concert results"
          >
            <span class="sheet-grabber" aria-hidden="true"></span>
            <span id="sheet-peek-label" class="sheet-peek-label">Concerts</span>
          </button>
        </div>

        <div class="results-content">
          <div id="artist-header" class="artist-header" hidden>
            <div class="artist-image-wrap">
              <img id="artist-avatar" class="artist-avatar" alt="" hidden />
              <span class="artist-image-fallback" aria-hidden="true">LIVE</span>
            </div>
            <div class="artist-copy">
              <span id="results-location" class="eyebrow">Upcoming route</span>
              <h2 id="artist-name" class="artist-name"></h2>
              <p id="results-summary" class="results-summary" aria-live="polite"></p>
            </div>
            <button id="share-search" class="share-button" type="button" hidden>
              <span id="share-label">Copy link</span>
              <span aria-hidden="true">↗</span>
            </button>
          </div>

          <div class="results-controls">
            <div class="sort-row">
              <div class="sort-group">
                <span class="filter-label" id="sort-label">Order</span>
                <div class="segmented" role="group" aria-labelledby="sort-label">
                  <button type="button" data-sort="distance" class="active">Closest</button>
                  <button type="button" data-sort="date">Soonest</button>
                </div>
              </div>
              <button
                type="button"
                id="filter-disclosure"
                class="filter-disclosure"
                aria-expanded="false"
                aria-controls="filter-panel"
              >
                <span>Filters</span>
                <span id="filter-count" class="filter-count" hidden>0</span>
                <span class="disclosure-caret" aria-hidden="true">&#9662;</span>
              </button>
            </div>
            <div id="filter-panel" class="filter-panel" hidden>
              <div class="filter-line" role="group" aria-label="Show filters">
                <span class="filter-label">Show</span>
                <div class="filter-control filter-toggles">
                  <button
                    type="button"
                    class="filter-toggle active"
                    data-filter="hideSoldOut"
                    aria-pressed="true"
                  >
                    Available only
                  </button>
                  <button
                    type="button"
                    class="filter-toggle active"
                    data-filter="hideUnreachable"
                    aria-pressed="true"
                  >
                    Drivable only
                  </button>
                </div>
              </div>
              <div class="filter-line">
                <label for="filter-distance" class="filter-label">Max drive</label>
                <div class="filter-control">
                  <input
                    type="range"
                    id="filter-distance"
                    class="filter-slider"
                    min="50"
                    max="1000"
                    step="50"
                    value="1000"
                    aria-label="Maximum drive distance in miles"
                  />
                  <output id="filter-distance-value" class="filter-value" for="filter-distance"
                    >Any</output
                  >
                </div>
              </div>
              <div class="filter-line">
                <span class="filter-label" id="filter-dates-label">Dates</span>
                <div class="filter-control filter-date-group">
                  <span class="date-shell" data-placeholder="Any start">
                    <input
                      type="date"
                      id="filter-date-from"
                      class="filter-date"
                      aria-label="Earliest show date"
                    />
                  </span>
                  <span class="date-separator" aria-hidden="true">→</span>
                  <span class="date-shell" data-placeholder="Any end">
                    <input
                      type="date"
                      id="filter-date-to"
                      class="filter-date"
                      aria-label="Latest show date"
                    />
                  </span>
                </div>
              </div>
            </div>
          </div>

          <div id="external-tour-link" class="external-tour-link" hidden>
            <span class="external-stamp" aria-hidden="true">↗</span>
            <p id="external-tour-copy" class="external-tour-copy"></p>
            <a
              id="external-tour-cta"
              class="btn-primary external-tour-cta"
              target="_blank"
              rel="noopener noreferrer"
            ></a>
          </div>
          <ol id="cards" class="cards"></ol>
        </div>
      </section>
    </aside>

    <section class="map-shell" aria-label="Concert route map">
      <button id="map-back" class="map-back" type="button" aria-label="Back to search" hidden>
        <span aria-hidden="true">&#8592;</span>
      </button>
      <div class="map-label" aria-hidden="true">
        <span>Live route map</span>
        <span>Drag to explore</span>
      </div>
      <main id="map" aria-label="Concert map"></main>
      <div class="map-caption" aria-hidden="true">
        <span>Every pin is a possibility.</span>
        <span class="map-caption-arrow">↗</span>
      </div>
    </section>

  </div>

  <!-- shared-search-data -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/static/app.js?v=12"></script>
</body>
</html>
